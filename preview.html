<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>批次下載調查成果</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen">
<div class="max-w-5xl mx-auto p-6">
  <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-200">

    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-black text-slate-800">批次下載工具</h1>
      <div id="authStatus" class="text-xs px-3 py-1 rounded bg-slate-100">初始化中</div>
    </div>

    <!-- 日期 -->
    <div class="grid md:grid-cols-2 gap-4 mt-6">
      <input id="startDate" type="date" class="border p-3 rounded-2xl">
      <input id="endDate" type="date" class="border p-3 rounded-2xl">
    </div>

    <!-- 選項 -->
    <div class="flex gap-6 mt-4">
      <label><input type="checkbox" id="chkXlsx" checked> XLSX</label>
      <label><input type="checkbox" id="chkPhoto" checked> 照片</label>
    </div>

    <!-- 按鈕 -->
    <div class="grid md:grid-cols-2 gap-4 mt-5">
      <button id="searchBtn" class="bg-blue-600 text-white p-3 rounded-2xl" disabled>查詢資料</button>
      <button id="downloadBtn" class="bg-emerald-600 text-white p-3 rounded-2xl" disabled>下載</button>
    </div>

    <!-- 狀態 -->
    <div id="statusBox" class="mt-4 text-sm text-slate-600">等待登入</div>

    <!-- 進度 -->
    <div class="mt-4">
      <div class="bg-slate-200 h-4 rounded-full">
        <div id="progressBar" class="bg-green-500 h-4 w-0 rounded-full"></div>
      </div>
      <div id="progressText" class="text-sm mt-1">0%</div>
    </div>

    <!-- 結果 -->
    <div class="mt-6 border rounded-2xl">
      <div id="resultList" class="max-h-96 overflow-y-auto"></div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
import { getStorage, ref, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

const app = initializeApp({
  apiKey: "AIzaSyAQtyOTpKY3ajw6u4spxwLyFZDw19xhQEE",
  authDomain: "fieldsurveyproject-cba4e.firebaseapp.com",
  projectId: "fieldsurveyproject-cba4e",
  storageBucket: "fieldsurveyproject-cba4e.firebasestorage.app"
});

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let results = [];

function updateProgress(p){
  document.getElementById("progressBar").style.width = p+"%";
  document.getElementById("progressText").innerText = Math.floor(p)+"%";
}

async function fetchBlob(path){
  const url = await getDownloadURL(ref(storage,path));
  const res = await fetch(url);
  return await res.blob();
}

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    await signInAnonymously(auth);
    return;
  }
  document.getElementById("authStatus").innerText="已連線";
  document.getElementById("searchBtn").disabled=false;
});

document.getElementById("searchBtn").onclick = async ()=>{
  const snap = await getDocs(collection(db,"artifacts/field-survey-app/public/data/completed_points"));
  results=[];
  snap.forEach(d=>results.push(d.data()));

  const html = results.map(r=>`
    <div class="p-3 border-b">
      <div class="font-bold">${r.unific_id}</div>
      <div class="text-xs text-gray-500">已調查</div>
    </div>
  `).join("");

  document.getElementById("resultList").innerHTML = html;
  document.getElementById("downloadBtn").disabled=false;
};

document.getElementById("downloadBtn").onclick = async ()=>{
  const zip = new JSZip();
  let total = results.length;
  let count = 0;

  for(const r of results){
    const id = r.unific_id;
    const folder = zip.folder(id);

    try{
      const blob = await fetchBlob(`artifacts/field-survey-app/completed_xlsx/${id}/${id}.xlsx`);
      folder.file(id+".xlsx",blob);
    }catch{}

    count++;
    updateProgress((count/total)*100);
  }

  const zipBlob = await zip.generateAsync({type:"blob"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(zipBlob);
  a.download="download.zip";
  a.click();
};
</script>
</body>
</html>
