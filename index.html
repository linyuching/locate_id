        async function initFirebase() {

                initializeApp,
                getAuth,
                signInAnonymously,
                onAuthStateChanged,
                getFirestore,
                getStorage
            } = window.firebaseCore;

            let config;
            try {
                config = typeof __firebase_config !== "undefined"

                    : backupConfig;
            } catch (e) {
                config = backupConfig;
            }

            if (!config?.apiKey) {
                alert("Firebase 設定缺少 apiKey，請先填入正確的 Web API Key。");
                console.error("Invalid Firebase config:", config);
                return;
            }

            const app = initializeApp(config);
            auth = getAuth(app);
            db = getFirestore(app);
            storage = getStorage(app);
            appId = typeof __app_id !== "undefined" ? __app_id : "field-survey-app";

            onAuthStateChanged(auth, async (u) => {
                user = u;
                if (!user) {
                    await signInAnonymously(auth);
                    return;
                }

                if (!assetsLoaded) {
                    assetsLoaded = true;
                    await autoLoadAssets();
                    subscribeCompletedPoints();
                    subscribeCompletedFiles();
                }
            });
        }

        async function autoLoadAssets() {
            try {
                showLoadingMask(true, "正在載入 KML 圖層與樣板...");
                allPoints = [];
                const allMarkersForBounds = [];

                for (const cfg of KML_FILES) {
                    try {
                        const res = await fetch(cfg.file);
                        if (!res.ok) throw new Error(`讀取失敗: ${cfg.file}`);
                        const text = await res.text();

                        const points = parseKML(text).map(p => ({
                            ...p,
                            layerLabel: cfg.label,
                            category: cfg.category,
                            status: cfg.status,
                            color: cfg.color,
                            iconType: cfg.iconType
                        }));

                        allPoints.push(...points);

                        const layer = plotPointsToLayer(points, cfg);
                        kmlLayers[cfg.label] = layer;

                        if (cfg.status === "未測量") {
                            layer.addTo(map);
                        }

                        layerControl.addOverlay(layer, cfg.label);
                        allMarkersForBounds.push(...layer.getLayers());
                    } catch (e) {
                        console.error("KML 載入失敗：", cfg.file, e);
                    }
                }

                const xlsxRes = await fetch("./template.xlsx");
                if (!xlsxRes.ok) throw new Error("template.xlsx 讀取失敗");
                templateData = await xlsxRes.arrayBuffer();

                const combined = [
                    ...allMarkersForBounds,
                    ...completedLayerGroup.getLayers()
                ];

                if (combined.length > 0) {
                    const group = L.featureGroup(combined);
                    map.fitBounds(group.getBounds().pad(0.1));
                }

                document.getElementById("loading").style.display = "none";
                document.getElementById("statusIndicator").className = "w-2.5 h-2.5 rounded-full bg-emerald-500";
                document.getElementById("statusTag").textContent = "已載入";
            } catch (err) {
                console.error(err);
                alert("載入 KML 或 template.xlsx 失敗，請確認檔案是否放在同一資料夾。");
                showLoadingMask(false);
            }
        }

        function parseKML(text) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(text, "text/xml");
            const placemarks = Array.from(xml.getElementsByTagName("Placemark"));

            return placemarks.map(p => {
                const name = p.getElementsByTagName("name")[0]?.textContent || "未命名";
                const desc = p.getElementsByTagName("description")[0]?.textContent || "";
                const coordsNode = p.getElementsByTagName("coordinates")[0];
                const coords = coordsNode ? coordsNode.textContent.trim().split(",") : [0, 0];

                let unific_id = "";
                let bury_loc = "";

                const extendedData = p.getElementsByTagName("ExtendedData")[0];
                if (extendedData) {
                    const dataNodes = Array.from(extendedData.getElementsByTagName("Data"));
                    for (const node of dataNodes) {
                        const dataName = node.getAttribute("name");
                        const val = node.getElementsByTagName("value")[0]?.textContent?.trim();

                        if (dataName === "unific_id" || dataName === "識別碼") {
                            unific_id = val;
                        }
                        if (dataName === "bury_loc") {
                            bury_loc = val;
                        }
                    }
                }

                if (!unific_id) {
                    let match = desc.match(/unific_id\s*:\s*([^<|\n|\r]+)/i);
                    if (!match) {
                        match = desc.match(/識別碼\s*:\s*([^<|\n|\r]+)/i);
                    }
                    if (match) {
                        unific_id = match[1].trim();
                    }
                }

                if (!bury_loc) {
                    const locMatch = desc.match(/bury_loc\s*:\s*([^<|\n|\r]+)/i);
                    bury_loc = locMatch ? locMatch[1].trim() : "";
                }

                if (!unific_id) {
                    console.warn("⚠️ 無法解析 unific_id / 識別碼：", name, desc);
                }

                return {
                    id: name,
                    unific_id,
                    lat: parseFloat(coords[1]),
                    lng: parseFloat(coords[0]),
                    bury_loc
                };
            }).filter(p => !isNaN(p.lat) && !isNaN(p.lng));
        }

        function getPointKey(point) {
            if (!point?.unific_id) {
                throw new Error("Point missing unific_id");

        function sanitizeFileName(str) {
            return (str || "").replace(/[\\/:*?"<>|]/g, "_").trim();
        }

        function buildExcelFileName(point) {
            const id = getPointKey(point);
            const safeId = sanitizeFileName(id);
            return `${safeId}.xlsx`;
        }

        function createFeatureIcon(iconType, color, isCompleted = false) {
            const iconSvg = getFeatureSvg(iconType, isCompleted);
            const bgColor = isCompleted ? "#64748b" : color;
            const borderColor = isCompleted ? "#334155" : "#ffffff";

            return L.divIcon({
                className: "",
                html: `
                    <div class="custom-poi-marker ${isCompleted ? "is-completed" : ""}" style="
                        width: 34px;
                        height: 34px;
                        border-radius: 999px;
                        background: ${bgColor};
                        border: 3px solid ${borderColor};
                        box-shadow: 0 2px 8px rgba(0,0,0,0.28);
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        transition: all 0.25s ease;
                    ">
                        ${iconSvg}
                    </div>
                `,
                iconSize: [34, 34],
                iconAnchor: [17, 17],
                popupAnchor: [0, -18]
            });
        }

        function getFeatureSvg(iconType, isCompleted = false) {
            const stroke = isCompleted ? "#e2e8f0" : "#ffffff";

            if (iconType === "valve") {
                return `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="4" stroke="${stroke}" stroke-width="2"/>
                        <path d="M12 2V6M12 18V22M2 12H6M18 12H22" stroke="${stroke}" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                `;
            }

            if (iconType === "hydrant") {
                return `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M9 21V14a3 3 0 0 1 6 0v7" stroke="${stroke}" stroke-width="2" stroke-linecap="round"/>
                        <path d="M8 10h8M10 6h4M7 21h10" stroke="${stroke}" stroke-width="2" stroke-linecap="round"/>
                        <path d="M8 10V8a4 4 0 1 1 8 0v2" stroke="${stroke}" stroke-width="2"/>
                    </svg>
                `;
            }

            if (iconType === "manhole") {
                return `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="7" stroke="${stroke}" stroke-width="2"/>
                        <path d="M8 12h8M12 8v8" stroke="${stroke}" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                `;
            }

            return `
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="5" stroke="${stroke}" stroke-width="2"/>
                </svg>
            `;
        }

        function updateMarkerPopup(marker, point, isCompleted) {
            const doneText = isCompleted
                ? `<div class="text-[11px] text-emerald-600 font-bold mb-2">已完成成果圖卡</div>`
                : `<div class="text-[11px] text-amber-600 font-bold mb-2">尚未完成成果圖卡</div>`;

            const popupContent = `
                <div class="text-center min-w-[180px]">
                    <div class="font-bold text-slate-800 mb-1">${point.id}</div>
                    <div class="text-[11px] text-slate-500 mb-1">${point.category}｜原始：${point.status}</div>
                    <div class="text-[11px] text-slate-400 mb-1">${point.unific_id || "缺少 unific_id"}</div>
                    ${doneText}
                    <button onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${point.lat},${point.lng}', '_blank')"
                            class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-md active:scale-95 transition-transform">
                        Google 導航
                    </button>
                </div>
            `;
            marker.bindPopup(popupContent, { className: "nav-popup", offset: [0, -10] });
        }

        function plotPointsToLayer(points, cfg) {
            const layer = L.layerGroup();

            points.forEach(p => {
                let pointKey = null;
                try {
                    pointKey = getPointKey(p);
                } catch (err) {
                    console.warn("略過缺少 unific_id 的點位：", p);
                    return;
                }

                const isCompleted = completedPointIds.has(pointKey);
                pointDataMap.set(pointKey, p);

                const marker = L.marker([p.lat, p.lng], {
                    icon: createFeatureIcon(cfg.iconType, cfg.color, isCompleted)
                });

                pointMarkerMap.set(pointKey, marker);
                pointSourceLayerMap.set(pointKey, layer);

                updateMarkerPopup(marker, p, isCompleted);

                marker.on("click", () => {
                    map.flyTo([p.lat, p.lng], 18);

                    if (selectedMarker) {
                        selectedMarker.getElement()?.classList.remove("selected-marker");
                    }

                    selectedMarker = marker;
                    marker.getElement()?.classList.add("selected-marker");
                    selectedPoint = p;

                    const currentCompleted = completedPointIds.has(pointKey);

                    document.getElementById("selectedId").textContent = p.id;
                    document.getElementById("selectedLoc").textContent = p.bury_loc || "位置未標註";
                    document.getElementById("selectedUnific").textContent =
                        `unific_id: ${p.unific_id || "❌缺失"} ｜ ${p.category} ｜ ${currentCompleted ? "已完成" : p.status}`;

                    document.getElementById("actionPanel").classList.add("show");
                    resetUIState();
                });

                if (!isCompleted) {
                    layer.addLayer(marker);
                } else {
                    completedLayerGroup.addLayer(marker);
                }
            });

            return layer;
        }

        function applyCompletedState(nextCompletedIds) {
            completedPointIds = nextCompletedIds;

            pointDataMap.forEach((point, pointKey) => {
                const marker = pointMarkerMap.get(pointKey);
                const sourceLayer = pointSourceLayerMap.get(pointKey);
                const isCompleted = completedPointIds.has(pointKey);

                if (!marker) return;

                marker.setIcon(createFeatureIcon(point.iconType, point.color, isCompleted));

                const el = marker.getElement();
                if (el) {
                    el.classList.toggle("finished-marker", isCompleted);
                }

                if (isCompleted) {
                    if (sourceLayer && sourceLayer.hasLayer(marker)) {
                        sourceLayer.removeLayer(marker);
                    }
                    if (!completedLayerGroup.hasLayer(marker)) {
                        completedLayerGroup.addLayer(marker);
                    }
                } else {
                    if (completedLayerGroup.hasLayer(marker)) {
                        completedLayerGroup.removeLayer(marker);
                    }
                    if (sourceLayer && !sourceLayer.hasLayer(marker)) {
                        sourceLayer.addLayer(marker);
                    }
                }

                updateMarkerPopup(marker, point, isCompleted);
            });
        }

        function getCompletedCollectionRef() {
            return collection(db, `artifacts/${appId}/public/data/completed_points`);
        }

        function subscribeCompletedPoints() {
            const { query, onSnapshot } = window.firebaseCore;
            const q = query(getCompletedCollectionRef());

            if (completedUnsubscribe) completedUnsubscribe();

            completedUnsubscribe = onSnapshot(q, (snapshot) => {
                const nextCompletedIds = new Set();

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    if (data?.pointKey) nextCompletedIds.add(data.pointKey);
                });

                applyCompletedState(nextCompletedIds);
            }, (err) => {
                console.error("completed_points 同步失敗", err);
            });
        }

        function subscribeCompletedFiles() {
            const { collection, onSnapshot } = window.firebaseCore;
            const filesRef = collection(db, `artifacts/${appId}/public/data/completed_files`);

            if (filesUnsubscribe) filesUnsubscribe();

            filesUnsubscribe = onSnapshot(filesRef, (snapshot) => {
                const items = [];
                snapshot.forEach((docSnap) => {
                    items.push(docSnap.data());
                });

                items.sort((a, b) => {
                    const ta = a?.uploadedAt?.seconds || 0;
                    const tb = b?.uploadedAt?.seconds || 0;
                    return tb - ta;
                });

                renderCompletedFiles(items);
            }, (err) => {
                console.error("completed_files 同步失敗", err);
            });
        }

        function renderCompletedFiles(items) {
            const countEl = document.getElementById("completedFilesCount");
            const listEl = document.getElementById("completedFilesList");

            countEl.textContent = items.length;

            if (!items.length) {
                listEl.innerHTML = `<div class="text-slate-400 text-xs">尚無已上傳成果檔</div>`;
                return;
            }

            listEl.innerHTML = items.map(item => {
                const title = item.fileName || "未命名成果檔";
                const pointKey = item.pointKey || "";
                const category = item.category || "";
                const originalStatus = item.originalStatus || "";
                const url = item.downloadURL || "#";

                return `
                    <div class="file-card border border-slate-200 rounded-xl p-3 bg-slate-50">
                        <div class="font-bold text-slate-800 text-xs break-all">${title}</div>
                        <div class="text-[11px] text-slate-500 mt-1">${pointKey} ｜ ${category} ｜ 原始：${originalStatus}</div>
                        <div class="mt-2">
                            <a href="${url}" target="_blank" class="inline-flex items-center px-3 py-1.5 rounded-lg bg-blue-600 text-white text-xs font-bold">
                                開啟 / 下載
                            </a>
                        </div>
                    </div>
                `;
            }).join("");
        }

        async function uploadExcelToCloud(blob, point) {
            const { ref, uploadBytes, getDownloadURL } = window.firebaseCore;
            const id = getPointKey(point);
            const safeId = sanitizeFileName(id);
            const fileName = buildExcelFileName(point);
            const storagePath = `artifacts/${appId}/completed_xlsx/${safeId}/${safeId}.xlsx`;

            const storageRef = ref(storage, storagePath);

            await uploadBytes(storageRef, blob, {
                contentType: XLSX_MIME
            });

            const downloadURL = await getDownloadURL(storageRef);

            return {
                fileName,
                storagePath,
                downloadURL
            };
        }

        async function savePointCompleted(point, fileInfo) {
            const { doc, setDoc, serverTimestamp } = window.firebaseCore;
            const pointKey = getPointKey(point);

            const pointRef = doc(db, `artifacts/${appId}/public/data/completed_points/${pointKey}`);
            await setDoc(pointRef, {
                pointKey,
                id: point.id || "",
                unific_id: point.unific_id || "",
                category: point.category || "",
                originalStatus: point.status || "",
                sourceLayerLabel: point.layerLabel || "",
                status: "已完成",
                completedBy: user?.uid || "anonymous",
                completedAt: serverTimestamp(),
                fileName: fileInfo.fileName,
                storagePath: fileInfo.storagePath,
                downloadURL: fileInfo.downloadURL
            }, { merge: true });
        }

        async function saveCompletedFileRecord(point, fileInfo) {
            const { doc, setDoc, serverTimestamp } = window.firebaseCore;
            const pointKey = getPointKey(point);

            const fileDocId = `${pointKey}__latest`;
            const fileRef = doc(db, `artifacts/${appId}/public/data/completed_files/${fileDocId}`);

            await setDoc(fileRef, {
                pointKey,
                id: point.id || "",
                unific_id: point.unific_id || "",
                category: point.category || "",
                originalStatus: point.status || "",
                fileName: fileInfo.fileName,
                storagePath: fileInfo.storagePath,
                downloadURL: fileInfo.downloadURL,
                uploadedBy: user?.uid || "anonymous",
                uploadedAt: serverTimestamp()
            }, { merge: true });
        }

        document.getElementById("navBtn").onclick = () => {
            if (!selectedPoint) return;
            const url = `https://www.google.com/maps/dir/?api=1&destination=${selectedPoint.lat},${selectedPoint.lng}`;
            window.open(url, "_blank");
        };

        const cameraInput = document.getElementById("cameraInput");
        document.getElementById("cameraBtn").onclick = () => cameraInput.click();
        document.getElementById("retakeBtn").onclick = () => cameraInput.click();

        cameraInput.onchange = async e => {
            if (!e.target.files[0]) return;
            showLoadingMask(true, "縮圖處理中...");

            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    const MAX_WIDTH = 1200;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    canvas.getContext("2d").drawImage(img, 0, 0, width, height);
                    processedPhotoBase64 = canvas.toDataURL("image/jpeg", 0.8);
                    document.getElementById("capturedImg").src = processedPhotoBase64;
                    document.getElementById("formArea").classList.add("hidden");
                    document.getElementById("previewArea").classList.remove("hidden");
                    showLoadingMask(false);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function closePanel() {
            document.getElementById("actionPanel").classList.remove("show");
            resetUIState();
        }

        function resetUIState() {
            processedPhotoBase64 = null;
            cameraInput.value = "";
            document.getElementById("formArea").classList.remove("hidden");
            document.getElementById("previewArea").classList.add("hidden");

            for (let i = 1; i <= 3; i++) {
                document.getElementById(`dist_${i}`).value = "";
                document.getElementById(`note_type_${i}`).value = "";
                const idInput = document.getElementById(`note_id_${i}`);
                idInput.value = "";
                idInput.classList.add("hidden");
            }
        }

        document.getElementById("closePanelBtn").onclick = closePanel;
        document.getElementById("finishBtn").onclick = () => {
            document.getElementById("formArea").classList.remove("hidden");
            document.getElementById("previewArea").classList.add("hidden");
        };

        async function generateExcel() {
            if (!templateData) throw new Error("template.xlsx 尚未載入");
            if (!selectedPoint) throw new Error("尚未選定點位");
            if (!selectedPoint.unific_id) throw new Error("此點缺少 unific_id");
            if (!processedPhotoBase64) throw new Error("請先拍攝照片");

            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(templateData);

            const offsets = [];
            for (let i = 1; i <= 3; i++) {
                const dist = document.getElementById(`dist_${i}`).value;
                const type = document.getElementById(`note_type_${i}`).value;
                const noteId = document.getElementById(`note_id_${i}`).value;

                let fullNote = type;
                if (type.includes("( )") && noteId) {
                    fullNote = type.replace("( )", `(${noteId})`);
                }
                offsets.push({ dist, note: fullNote });
            }

            const imageId = workbook.addImage({
                base64: processedPhotoBase64,
                extension: "jpeg"
            });

            const dims = await new Promise((resolve) => {
                const i = new Image();
                i.onload = () => resolve({ w: i.width, h: i.height });
                i.src = processedPhotoBase64;
            });

            const targetHeightPx = 227;
            const targetWidthPx = targetHeightPx * (dims.w / dims.h);

            workbook.eachSheet((sheet) => {
                let photoInsertedInSheet = false;

                sheet.eachRow({ includeEmpty: true }, (row, rowNumber) => {
                    row.eachCell({ includeEmpty: true }, (cell, colNumber) => {
                        const cellText = String(cell.value || "").trim();
                        const cleanVal = cellText.replace(/\s/g, "");

                        if (cleanVal === "編號") {
                            let offset = 1;
                            while (colNumber + offset <= sheet.columnCount) {
                                const targetCell = sheet.getRow(rowNumber).getCell(colNumber + offset);
                                if (targetCell.master.address !== cell.master.address) {
                                    targetCell.master.value = selectedPoint.unific_id || "";
                                    break;
                                }
                                offset++;
                            }
                        }

                        if (cleanVal === "位置") {
                            let offset = 1;
                            while (colNumber + offset <= sheet.columnCount) {
                                const targetCell = sheet.getRow(rowNumber).getCell(colNumber + offset);
                                if (targetCell.master.address !== cell.master.address) {
                                    targetCell.master.value = selectedPoint.bury_loc || "";
                                    break;
                                }
                                offset++;
                            }
                        }

                        if (cleanVal === "位置描述") {
                            let rowOffset = 1;
                            while (rowNumber + rowOffset <= sheet.rowCount) {
                                const targetCell = sheet.getRow(rowNumber + rowOffset).getCell(colNumber);
                                if (targetCell.master.address !== cell.master.address) {
                                    targetCell.master.value = selectedPoint.bury_loc || "";
                                    break;
                                }
                                rowOffset++;
                            }
                        }

                        if (cleanVal === "支距") {
                            for (let i = 0; i < 3; i++) {
                                const dataRow = sheet.getRow(rowNumber + 1 + i);
                                dataRow.getCell(colNumber + 1).master.value = offsets[i].dist;
                                dataRow.getCell(colNumber + 2).master.value = offsets[i].note;
                            }
                        }

                        if (!photoInsertedInSheet && cleanVal.includes("現場照片")) {
                            sheet.addImage(imageId, {
                                tl: { col: colNumber - 1 + 0.1, row: rowNumber + 0.1 },
                                ext: { width: targetWidthPx, height: targetHeightPx },
                                editAs: "oneCell"
                            });
                            photoInsertedInSheet = true;
                        }
                    });
                });
            });

            const buffer = await workbook.xlsx.writeBuffer();
            return new Blob([buffer], { type: XLSX_MIME });
        }

        document.getElementById("exportBtn").onclick = async () => {
            if (!selectedPoint?.unific_id) {
                alert("此點位沒有 unific_id，禁止匯出！");
                return;
            }

            const pointKey = getPointKey(selectedPoint);
            if (completedPointIds.has(pointKey)) {
                const ok = confirm("此點已有成果檔，是否覆蓋？");
                if (!ok) return;
            }

            try {
                showLoadingMask(true, "產生並上傳成果圖卡中...");

                const blob = await generateExcel();
                const fileInfo = await uploadExcelToCloud(blob, selectedPoint);

                await saveCompletedFileRecord(selectedPoint, fileInfo);
                await savePointCompleted(selectedPoint, fileInfo);

                triggerDownload(blob, fileInfo.fileName);

                if (selectedMarker) selectedMarker.closePopup();

                setTimeout(() => {
                    closePanel();
                }, 800);
            } catch (err) {
                console.error(err);
                alert("上傳或匯出失敗：" + err.message);
            } finally {
                showLoadingMask(false);
            }
        };

        function triggerDownload(blob, fileName) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.style.display = "none";
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);

            try {
                a.click();
            } catch (e) {
                window.location.href = url;
            }

            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 10000);

            if (/Line|FBAN|FBAV|Messenger/i.test(navigator.userAgent)) {
                alert("提醒：您正在使用社群 App 內建瀏覽器，若下載沒反應，請點選右上角並選擇「以 Chrome/Safari 開啟」。");
            }
        }

        function showLoadingMask(show, text) {
            document.getElementById("loading").style.display = show ? "flex" : "none";
            if (show && text) {
                document.getElementById("loadingMsg").textContent = text;
            }
        }
    </script>
</body>
</html>
