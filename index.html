<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>外業調查拍照系統 (協同版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseCore = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, doc, setDoc, collection, onSnapshot, query };
    </script>

    <style>
        #map { height: 100vh; width: 100%; z-index: 1; }
        .loading-overlay {
            display: flex;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            color: white;
            flex-direction: column;
        }
        .btn-active:active { transform: scale(0.95); }
        #actionPanel { 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: none;
        }
        #actionPanel::-webkit-scrollbar { display: none; }
        #actionPanel.show { transform: translateY(0); }
        .leaflet-top { margin-top: 80px; }
        .selected-marker { filter: hue-rotate(240deg) brightness(1.2); transform: scale(1.3); transition: all 0.3s; z-index: 999 !important; }
        .finished-marker { filter: hue-rotate(90deg) brightness(1.1) saturate(1.5); opacity: 0.9; }
        .leaflet-control-locate {
            background: white;
            width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 4px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen overflow-hidden">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-500 mb-6"></div>
        <h2 class="text-xl font-bold mb-2 tracking-tight text-center px-4">系統資料同步中</h2>
        <div id="loadingMsg" class="text-slate-400 text-sm text-center px-8 space-y-2">
            <p>正在連接雲端並載入資源...</p>
        </div>
    </div>

    <div id="map"></div>

    <div class="absolute top-4 left-4 right-4 z-[1000] pointer-events-none">
        <div class="bg-white/95 backdrop-blur-md p-3 rounded-2xl shadow-2xl flex justify-between items-center pointer-events-auto border border-white/20">
            <div class="flex items-center gap-2">
                <div id="statusIndicator" class="w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse"></div>
                <h1 class="text-lg font-black text-slate-800 tracking-tighter">外業調查拍照系統 <span class="text-blue-500 text-xs">(團隊版)</span></h1>
            </div>
            <div id="statusTag" class="bg-slate-100 text-slate-500 text-[10px] px-2.5 py-1 rounded-full font-black uppercase tracking-tighter">連線中</div>
        </div>
    </div>

    <div id="actionPanel" class="fixed bottom-0 left-0 right-0 z-[2000] bg-white rounded-t-[2.5rem] shadow-[0_-15px_50px_rgba(0,0,0,0.4)] p-6 pb-12 border-t border-slate-100">
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
        
        <div class="flex justify-between items-start mb-6">
            <div class="flex-1">
                <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest bg-blue-50 px-2 py-0.5 rounded-md">目前選定點位 (Unific ID)</span>
                <h2 class="text-2xl font-black text-slate-900 mt-2 break-all leading-tight" id="selectedId">讀取中</h2>
                <p id="selectedCoords" class="text-xs font-mono text-slate-400 mt-2 tracking-tighter"></p>
                <p id="selectedLoc" class="text-xs text-slate-500 mt-1 font-medium"></p>
            </div>
            <div class="flex flex-col gap-2 ml-4">
                <button id="closePanelBtn" class="bg-slate-100 text-slate-400 p-2.5 rounded-full btn-active self-end shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
                <button id="navBtn" class="bg-blue-600 text-white p-4 rounded-2xl btn-active shadow-lg shadow-blue-200 flex flex-col items-center justify-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span class="text-[8px] font-bold">導航</span>
                </button>
            </div>
        </div>

        <div id="captureArea">
            <button id="cameraBtn" class="w-full bg-slate-900 text-white py-6 rounded-3xl font-black text-xl shadow-2xl btn-active flex items-center justify-center gap-4 tracking-tighter">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                拍攝現場照片
            </button>
        </div>

        <div id="previewArea" class="hidden animate-in fade-in slide-in-from-bottom-6 duration-500">
            <div class="relative mb-5 group">
                <img id="capturedImg" src="" class="w-full h-56 object-cover rounded-3xl border-4 border-slate-50 shadow-inner">
                <button id="retakeBtn" class="absolute bottom-4 right-4 bg-white/90 backdrop-blur-md px-4 py-2 rounded-full text-xs font-black text-slate-800 shadow-xl border border-white/50 btn-active">重新拍攝</button>
            </div>
            
            <div class="space-y-4">
                <button id="exportBtn" class="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl btn-active text-lg flex items-center justify-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                    匯出成果圖卡 (.xlsx)
                </button>
                <button id="finishBtn" class="w-full bg-slate-100 text-slate-600 font-black py-4 rounded-2xl btn-active text-sm shadow-sm border border-slate-200">
                    取消並回地圖
                </button>
            </div>
        </div>

        <input type="file" id="cameraInput" accept="image/*" capture="camera" class="hidden">
    </div>

    <script type="module">
        const backupConfig = {
            apiKey: "AIzaSyAQtyOTpKY3ajw6u4spxwLyFZDw19xhQEE",
            authDomain: "fieldsurveyproject-cba4e.firebaseapp.com",
            projectId: "fieldsurveyproject-cba4e",
            storageBucket: "fieldsurveyproject-cba4e.firebasestorage.app",
            messagingSenderId: "118885164027",
            appId: "1:118885164027:web:d8a0e0478eddfc48ba615e"
        };

        let map, markersLayer, userLocationMarker, selectedPoint = null, templateData = null, processedPhotoBase64 = null, selectedMarker = null;
        let finishedPoints = new Map();
        let db, auth, user, appId;
        const XLSX_MIME = "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";

        window.onload = async function() {
            initMap();
            await initFirebase();
            await autoLoadAssets();
        };

        async function initFirebase() {
            const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, collection, onSnapshot } = window.firebaseCore;
            let config;
            try { config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : backupConfig; } catch (e) { config = backupConfig; }
            const app = initializeApp(config);
            auth = getAuth(app);
            db = getFirestore(app);
            appId = typeof __app_id !== 'undefined' ? __app_id : 'field-survey-app';

            onAuthStateChanged(auth, (u) => {
                user = u;
                if (user) {
                    const publicDataCol = collection(db, 'artifacts', appId, 'public', 'data', 'finished_points');
                    onSnapshot(publicDataCol, (snapshot) => {
                        finishedPoints.clear();
                        snapshot.forEach(doc => finishedPoints.set(doc.id, doc.data()));
                        refreshMarkers();
                    });
                } else {
                    signInAnonymously(auth);
                }
            });
        }

        function initMap() {
            map = L.map('map', { zoomControl: false, maxZoom: 20 }).setView([23.5, 121], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            markersLayer = L.layerGroup().addTo(map);
            const LocateControl = L.Control.extend({
                options: { position: 'topleft' },
                onAdd: function() {
                    const container = L.DomUtil.create('div', 'leaflet-control-locate');
                    container.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-700" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06z" /></svg>`;
                    container.onclick = () => map.locate({ setView: true, maxZoom: 16 });
                    return container;
                }
            });
            map.addControl(new LocateControl());
        }

        async function autoLoadAssets() {
            try {
                const kmlRes = await fetch('./POI.kml');
                const kmlText = await kmlRes.text();
                window.allPoints = parseKML(kmlText); 
                plotPoints(window.allPoints);

                const xlsxRes = await fetch('./template.xlsx');
                templateData = await xlsxRes.arrayBuffer();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('statusIndicator').className = 'w-2.5 h-2.5 rounded-full bg-emerald-500';
            } catch (err) { console.error(err); }
        }

        function parseKML(text) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(text, "text/xml");
            const placemarks = xml.getElementsByTagName("Placemark");
            const results = [];
            for (let i = 0; i < placemarks.length; i++) {
                const p = placemarks[i];
                const name = p.getElementsByTagName("name")[0]?.textContent || "未命名";
                const desc = p.getElementsByTagName("description")[0]?.textContent || "";
                const coords = p.getElementsByTagName("coordinates")[0]?.textContent?.trim();
                
                let unific_id = name;
                let bury_loc = "";

                // 解析 description 中的 key: value 格式
                const idMatch = desc.match(/unific_id:\s*([^<|\n|\r]+)/i);
                const locMatch = desc.match(/bury_loc:\s*([^<|\n|\r]+)/i);

                if (idMatch) unific_id = idMatch[1].trim();
                if (locMatch) bury_loc = locMatch[1].trim();

                if (coords) {
                    const parts = coords.split(",");
                    results.push({ 
                        id: name, 
                        unific_id: unific_id, 
                        lat: parseFloat(parts[1]), 
                        lng: parseFloat(parts[0]), 
                        bury_loc: bury_loc 
                    });
                }
            }
            return results;
        }

        function plotPoints(points) {
            markersLayer.clearLayers();
            points.forEach(p => {
                const m = L.marker([p.lat, p.lng]).on('click', () => {
                    map.flyTo([p.lat, p.lng], 18);
                    if (selectedMarker) { selectedMarker.getElement()?.classList.remove('selected-marker'); }
                    selectedMarker = m;
                    m.getElement()?.classList.add('selected-marker');
                    selectedPoint = p;
                    document.getElementById('actionPanel').classList.add('show');
                    document.getElementById('selectedId').textContent = p.unific_id; // 優先顯示 unific_id
                    document.getElementById('selectedCoords').textContent = `緯度: ${p.lat.toFixed(6)} / 經度: ${p.lng.toFixed(6)}`;
                    document.getElementById('selectedLoc').textContent = p.bury_loc ? `位置: ${p.bury_loc}` : "";
                    resetUIState();
                });
                markersLayer.addLayer(m);
            });
        }

        function refreshMarkers() {
            markersLayer.eachLayer(m => {
                const latlng = m.getLatLng();
                const p = window.allPoints?.find(pt => Math.abs(pt.lat - latlng.lat) < 0.0001);
                // 使用 unific_id 作為狀態檢查基準
                if (p && finishedPoints.has(p.unific_id)) { m.getElement()?.classList.add('finished-marker'); }
            });
        }

        const cameraInput = document.getElementById('cameraInput');
        document.getElementById('cameraBtn').onclick = () => cameraInput.click();
        document.getElementById('retakeBtn').onclick = () => cameraInput.click();
        cameraInput.onchange = async e => {
            if (!e.target.files[0]) return;
            showLoadingMask(true, "處理照片中...");
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200;
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    processedPhotoBase64 = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('capturedImg').src = processedPhotoBase64;
                    document.getElementById('captureArea').classList.add('hidden');
                    document.getElementById('previewArea').classList.remove('hidden');
                    showLoadingMask(false);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function closePanel() { document.getElementById('actionPanel').classList.remove('show'); resetUIState(); }
        function resetUIState() { processedPhotoBase64 = null; document.getElementById('captureArea').classList.remove('hidden'); document.getElementById('previewArea').classList.add('hidden'); }
        document.getElementById('closePanelBtn').onclick = closePanel;
        document.getElementById('finishBtn').onclick = closePanel;

        async function generateExcel() {
            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(templateData);
            const imageId = workbook.addImage({ base64: processedPhotoBase64, extension: 'jpeg' });
            
            // 高度固定 6cm (約 227 像素)
            const targetHeightPx = 227; 
            const dims = await new Promise(r => { const i = new Image(); i.onload = () => r({w:i.width,h:i.height}); i.src = processedPhotoBase64; });
            const targetWidthPx = targetHeightPx * (dims.w / dims.h);

            workbook.eachSheet((sheet) => {
                const sheetName = sheet.name.replace(/\s/g, '');
                let photoInserted = false;
                sheet.eachRow({ includeEmpty: true }, (row, rowNumber) => {
                    row.eachCell({ includeEmpty: true }, (cell, colNumber) => {
                        const cleanVal = (cell.value ? String(cell.value) : "").replace(/\s/g, '');
                        
                        // 1. 處理「位置」欄位
                        if (cleanVal === "位置") {
                            let offset = 1;
                            // 跳過合併區域
                            while (sheet.getRow(rowNumber).getCell(colNumber + offset).master.address === cell.master.address) { offset++; }
                            sheet.getRow(rowNumber).getCell(colNumber + offset).value = selectedPoint.bury_loc || "";
                        }
                        
                        // 2. 處理「編號」欄位
                        if (cleanVal === "編號") {
                            if (sheetName.includes("圖卡背面")) {
                                // 圖卡背面邏輯：填入下方儲存格
                                sheet.getRow(rowNumber + 1).getCell(colNumber).master.value = selectedPoint.unific_id;
                            } else {
                                // 制水閥記錄卡邏輯：填入右側欄位
                                let offset = 1;
                                while (sheet.getRow(rowNumber).getCell(colNumber + offset).master.address === cell.master.address) { offset++; }
                                sheet.getRow(rowNumber).getCell(colNumber + offset).value = selectedPoint.unific_id;
                            }
                        }
                        
                        // 3. 處理「現場照片」標籤
                        if (!photoInserted && cleanVal.includes("現場照片")) {
                            sheet.addImage(imageId, { 
                                tl: { col: colNumber - 1 + 0.1, row: rowNumber + 0.1 }, 
                                ext: { width: targetWidthPx, height: targetHeightPx } 
                            });
                            photoInserted = true; 
                        }
                    });
                });
            });
            const buffer = await workbook.xlsx.writeBuffer();
            return new Blob([buffer], { type: XLSX_MIME });
        }

        document.getElementById('exportBtn').onclick = async () => {
            try {
                showLoadingMask(true, "產生成果中...");
                const blob = await generateExcel();
                // 檔名使用 unific_id
                triggerDownload(blob, `${selectedPoint.unific_id}.xlsx`);
                setTimeout(closePanel, 500);
            } catch (err) { alert("出錯: " + err.message); }
            showLoadingMask(false);
        };

        function triggerDownload(blob, fileName) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.style.display = "none";
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a); // 手機必須掛載到 DOM
            try { a.click(); } catch (e) { window.location.href = url; }
            
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 10000); 

            if (/Line|FBAN|FBAV|Messenger/i.test(navigator.userAgent)) {
                alert("提醒：您正在使用社群 App 內建瀏覽器，若下載沒反應，請點選右上角並選擇「以 Chrome/Safari 開啟」。");
            }
        }

        function showLoadingMask(s, t) {
            document.getElementById('loading').style.display = s ? 'flex' : 'none';
            if (s) document.getElementById('loadingMsg').textContent = t;
        }
    </script>
</body>
</html>
