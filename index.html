    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import {
            getFirestore,
            doc,
            setDoc,
            collection,
            onSnapshot,
            query,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        import {
            getStorage,
            ref,
            uploadBytes,
            getDownloadURL
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

        window.firebaseCore = {
            initializeApp,
            getAuth,
            signInAnonymously,
            onAuthStateChanged,
            getFirestore,
            doc,
            setDoc,
            collection,
            onSnapshot,
            query,

            getStorage,

    <style>
        html, body { margin: 0; padding: 0; }
        body { background: #0f172a; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        .loading-overlay {
            display: flex;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            color: white;
            flex-direction: column;
        }

        .btn-active:active { transform: scale(0.95); }

        #actionPanel {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: none;
        }
        #actionPanel::-webkit-scrollbar { display: none; }
        #actionPanel.show { transform: translateY(0); }

        .leaflet-top { margin-top: 80px; }
        .leaflet-control-locate {
            background: white;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
        .nav-popup .leaflet-popup-content-wrapper { border-radius: 12px; padding: 5px; }
        .nav-popup .leaflet-popup-content { margin: 10px; text-align: center; }

        .selected-marker {
            transform: scale(1.18);
            z-index: 999 !important;
        }

        .finished-marker {
            opacity: 0.96;
        }

        .custom-poi-marker.is-completed {
            box-shadow: 0 0 0 2px rgba(16,185,129,0.35), 0 2px 8px rgba(0,0,0,0.28);
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .leaflet-control-layers {
            border-radius: 14px !important;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.18) !important;
            border: 1px solid rgba(255,255,255,0.4) !important;
        }

        .file-card a {
            text-decoration: none;
        }

        .thumb-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .thumb-box {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
            aspect-ratio: 4 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumb-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumb-empty {
            font-size: 10px;
            color: #94a3b8;
            font-weight: 700;
        }
    </style>
</head>

        function initMap() {
            map = L.map("map", { zoomControl: false, maxZoom: 20 }).setView([24.9, 121.0], 13);

            const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                attribution: "&copy; OpenStreetMap contributors"
            }).addTo(map);

            const baseMaps = { "OpenStreetMap": osm };
            completedLayerGroup = L.layerGroup().addTo(map);

            layerControl = L.control.layers(baseMaps, {}, {
                collapsed: false,

        async function autoLoadAssets() {
            try {
                showLoadingMask(true, "正在載入 KML 圖層與樣板...");
                allPoints = [];
                const allMarkersForBounds = [];

                for (const cfg of KML_FILES) {
                    try {
                        const res = await fetch(cfg.file);
                        if (!res.ok) throw new Error(`讀取失敗: ${cfg.file}`);
                        const text = await res.text();

                        const points = parseKML(text).map(p => ({
                            ...p,
                            layerLabel: cfg.label,
                            category: cfg.category,
                            status: cfg.status,
                            color: cfg.color,
                            iconType: cfg.iconType
                        }));

                        console.log(cfg.label, "點位數量:", points.length);
                        allPoints.push(...points);

                        const layer = plotPointsToLayer(points, cfg);
                        kmlLayers[cfg.label] = layer;

                        if (cfg.status === "未測量") {
                            layer.addTo(map);
                        }

                        layerControl.addOverlay(layer, cfg.label);
                        allMarkersForBounds.push(...layer.getLayers());
                    } catch (e) {
                        console.error("KML 載入失敗：", cfg.file, e);
                    }
                }

                const xlsxRes = await fetch("./template.xlsx");
                if (!xlsxRes.ok) throw new Error("template.xlsx 讀取失敗");
                templateData = await xlsxRes.arrayBuffer();

                const combined = [...allMarkersForBounds, ...completedLayerGroup.getLayers()];
                if (combined.length > 0) {

                    map.fitBounds(group.getBounds().pad(0.1));

                document.getElementById("loading").style.display = "none";
                document.getElementById("statusIndicator").className = "w-2.5 h-2.5 rounded-full bg-emerald-500";
                document.getElementById("statusTag").textContent = "已載入";

                showLoadingMask(false);
            }
        }

        function parseKML(text) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(text, "text/xml");
            const placemarks = Array.from(xml.getElementsByTagName("Placemark"));

            return placemarks.map(p => {
                const name = p.getElementsByTagName("name")[0]?.textContent || "未命名";
                const desc = p.getElementsByTagName("description")[0]?.textContent || "";
                const coordsNode = p.getElementsByTagName("coordinates")[0];
                const coords = coordsNode ? coordsNode.textContent.trim().split(",") : [0, 0];

                let unific_id = "";
                let bury_loc = "";

                const extendedData = p.getElementsByTagName("ExtendedData")[0];
                if (extendedData) {
                    const dataNodes = Array.from(extendedData.getElementsByTagName("Data"));
                    for (const node of dataNodes) {
                        const dataName = node.getAttribute("name");
                        const val = node.getElementsByTagName("value")[0]?.textContent?.trim();

                        if (dataName === "unific_id" || dataName === "識別碼") {
                            unific_id = val;
                        }
                        if (dataName === "bury_loc" || dataName === "地址") {
                            bury_loc = val;
                        }
                    }
                }

                if (!unific_id) {
                    let match = desc.match(/unific_id\s*:\s*([^<|\n|\r]+)/i);
                    if (!match) match = desc.match(/識別碼\s*:\s*([^<|\n|\r]+)/i);
                    if (match) unific_id = match[1].trim();
                }

                if (!bury_loc) {
                    let locMatch = desc.match(/bury_loc\s*:\s*([^<|\n|\r]+)/i);
                    if (!locMatch) locMatch = desc.match(/地址\s*:\s*([^<|\n|\r]+)/i);
                    bury_loc = locMatch ? locMatch[1].trim() : "";
                }

                return {
                    id: name,
                    unific_id,
                    lat: parseFloat(coords[1]),
                    lng: parseFloat(coords[0]),
                    bury_loc
                };
            }).filter(p => !isNaN(p.lat) && !isNaN(p.lng));
        }

        function getPointKey(point) {
            if (!point?.unific_id) throw new Error("Point missing unific_id");
            return point.unific_id.trim();
        }

        function getDisplayKey(point) {
            if (point?.unific_id && point.unific_id.trim()) return point.unific_id.trim();
            if (point?.id && point.id.trim()) return `NOID_${point.id.trim()}_${point.lat}_${point.lng}`;
            return `NOID_${point.lat}_${point.lng}`;
        }

        function sanitizeFileName(str) {
            return (str || "").replace(/[\\/:*?"<>|]/g, "_").trim();
        }

        function buildExcelFileName(point) {
            const id = getPointKey(point);
            const safeId = sanitizeFileName(id);
            return `${safeId}.xlsx`;
        }

        function createFeatureIcon(iconType, color, isCompleted = false) {
            const iconSvg = getFeatureSvg(iconType, isCompleted);

            const borderColor = isCompleted ? "#065f46" : "#ffffff";

            return L.divIcon({
                className: "",
                html: `
                    <div class="custom-poi-marker ${isCompleted ? "is-completed" : ""}" style="
                        width: 34px;
                        height: 34px;
                        border-radius: 999px;
                        background: ${bgColor};
                        border: 3px solid ${borderColor};
                        box-shadow: 0 2px 8px rgba(0,0,0,0.28);
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        transition: all 0.25s ease;

                        ${iconSvg}
                    </div>
                `,
                iconSize: [34, 34],
                iconAnchor: [17, 17],
                popupAnchor: [0, -18]
            });
        }

        function getFeatureSvg(iconType, isCompleted = false) {
            const stroke = "#ffffff";
            if (iconType === "valve") {
                return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke="${stroke}" stroke-width="2"/><path d="M12 2V6M12 18V22M2 12H6M18 12H22" stroke="${stroke}" stroke-width="2" stroke-linecap="round"/></svg>`;
            }
            if (iconType === "hydrant") {
                return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 21V14a3 3 0 0 1 6 0v7" stroke="${stroke}" stroke-width="2" stroke-linecap="round"/><path d="M8 10h8M10 6h4M7 21h10" stroke="${stroke}" stroke-width="2" stroke-linecap="round"/><path d="M8 10V8a4 4 0 1 1 8 0v2" stroke="${stroke}" stroke-width="2"/></svg>`;
            }
            if (iconType === "manhole") {
                return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="7" stroke="${stroke}" stroke-width="2"/><path d="M8 12h8M12 8v8" stroke="${stroke}" stroke-width="2" stroke-linecap="round"/></svg>`;
            }
            return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="${stroke}" stroke-width="2"/></svg>`;
        }

        function plotPointsToLayer(points, cfg) {
            const layer = L.layerGroup();

            points.forEach(p => {
                const pointKey = getDisplayKey(p);
                const hasUnificId = !!(p.unific_id && p.unific_id.trim());
                const isCompleted = hasUnificId ? completedPointIds.has(p.unific_id.trim()) : false;

                pointDataMap.set(pointKey, p);

                const marker = L.marker([p.lat, p.lng], {
                    icon: createFeatureIcon(cfg.iconType, cfg.color, isCompleted)
                });

                pointMarkerMap.set(pointKey, marker);
                pointSourceLayerMap.set(pointKey, layer);
                updateMarkerPopup(marker, p, isCompleted);

                marker.on("click", () => {
                    map.flyTo([p.lat, p.lng], 18);

                    if (selectedMarker) selectedMarker.getElement()?.classList.remove("selected-marker");
                    selectedMarker = marker;
                    marker.getElement()?.classList.add("selected-marker");
                    selectedPoint = p;

                    const currentCompleted = p.unific_id ? completedPointIds.has(p.unific_id.trim()) : false;
                    const canSubmit = !!(p.unific_id && p.unific_id.trim());

                    document.getElementById("selectedId").textContent = p.id;
                    document.getElementById("selectedLoc").textContent = p.bury_loc || "位置未標註";
                    document.getElementById("selectedUnific").textContent =
                        `unific_id: ${p.unific_id || "❌缺失"} ｜ ${p.category} ｜ ${currentCompleted ? "已調查" : p.status}${canSubmit ? "" : " ｜ 不可送出"}`;

                    document.getElementById("actionPanel").classList.add("show");
                    resetUIState();
                });

                layer.addLayer(marker);
            });

            return layer;
        }

        function applyCompletedState(nextCompletedIds) {
            completedPointIds = nextCompletedIds;

            pointDataMap.forEach((point, pointKey) => {
                const marker = pointMarkerMap.get(pointKey);
                const sourceLayer = pointSourceLayerMap.get(pointKey);
                const realKey = point?.unific_id ? point.unific_id.trim() : null;
                const isCompleted = realKey ? completedPointIds.has(realKey) : false;

                if (!marker) return;

                marker.setIcon(createFeatureIcon(point.iconType, point.color, isCompleted));

                const el = marker.getElement();
                if (el) el.classList.toggle("finished-marker", isCompleted);

                updateMarkerPopup(marker, point, isCompleted);

                if (realKey && isCompleted) {
                    if (sourceLayer && sourceLayer.hasLayer(marker)) sourceLayer.removeLayer(marker);
                    if (!completedLayerGroup.hasLayer(marker)) completedLayerGroup.addLayer(marker);
                } else {
                    if (completedLayerGroup.hasLayer(marker)) completedLayerGroup.removeLayer(marker);
                    if (sourceLayer && !sourceLayer.hasLayer(marker)) sourceLayer.addLayer(marker);
                }
            });
        }

        function subscribeCompletedPoints() {

            const q = query(getCompletedCollectionRef());

                const nextCompletedIds = new Set();
                snapshot.forEach((docSnap) => {

                    if (data?.pointKey) nextCompletedIds.add(data.pointKey);
                });
                applyCompletedState(nextCompletedIds);
            }, (err) => {
                console.error("completed_points 同步失敗", err);
            });
        }

        function compressImageFile(file, maxWidth = 1200, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement("canvas");
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth) {
                            height *= maxWidth / width;
                            width = maxWidth;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL("image/jpeg", quality));
                    };
                    img.onerror = reject;
                    img.src = ev.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function collectOffsetData() {
            const offsets = [];
            for (let i = 1; i <= 3; i++) {
                const dist = document.getElementById(`dist_${i}`).value.trim();
                const type = document.getElementById(`note_type_${i}`).value.trim();
                const noteId = document.getElementById(`note_id_${i}`).value.trim();

                let fullNote = type;
                if (type.includes("( )") && noteId) {
                    fullNote = type.replace("( )", `(${noteId})`);
                }

                offsets.push({ index: i, dist, note: fullNote });
            }
            return offsets;
        }

            for (const item of offsets) {

                    alert(`請填寫第 ${item.index} 筆支距距離`);
                    return false;

                if (!item.note) {

                if (!offsetPhotoBase64[i]) {

                    return false;
                }

            if (!trafficPhotoBase64) {

            previewOffsets.innerHTML = offsets.map(item => `
                <div class="rounded-2xl border border-slate-200 bg-white px-3 py-2">
                    <div><span class="font-bold text-slate-700">支距 ${item.index}</span></div>
                    <div class="text-slate-600">距離：${item.dist}</div>
                    <div class="text-slate-600">註記：${item.note}</div>
                </div>
            `).join("");
        }

        function showPreviewMode() {
            document.getElementById("formArea").classList.add("hidden");
            document.getElementById("previewArea").classList.remove("hidden");
        }

        function showEditMode() {
            document.getElementById("formArea").classList.remove("hidden");
            document.getElementById("previewArea").classList.add("hidden");
        }

        document.getElementById("navBtn").onclick = () => {
            if (!selectedPoint) return;
            const url = `https://www.google.com/maps/dir/?api=1&destination=${selectedPoint.lat},${selectedPoint.lng}`;
            window.open(url, "_blank");
        };

        const cameraInput = document.getElementById("cameraInput");
        document.getElementById("cameraBtn").onclick = () => cameraInput.click();

        cameraInput.onchange = async e => {
            if (!e.target.files[0]) return;
            showLoadingMask(true, "縮圖處理中...");
            try {
                processedPhotoBase64 = await compressImageFile(e.target.files[0], 1200, 0.8);
            } catch (err) {
                console.error(err);
                alert("主照片處理失敗");
            } finally {
                showLoadingMask(false);
            }
        };

        document.querySelectorAll(".offsetPhotoBtn").forEach(btn => {
            btn.onclick = () => {
                const idx = Number(btn.dataset.index);
                document.getElementById(`offsetCameraInput${idx}`).click();
            };
        });

        document.querySelectorAll(".offsetPhotoClearBtn").forEach(btn => {
            btn.onclick = () => {
                const idx = Number(btn.dataset.index);
                offsetPhotoBase64[idx] = null;
                document.getElementById(`offsetCameraInput${idx}`).value = "";
                updateOffsetPhotoStatus();
            };
        });

        for (let i = 0; i < 3; i++) {
            const input = document.getElementById(`offsetCameraInput${i}`);
            input.onchange = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;

                try {
                    showLoadingMask(true, `處理支距 ${i + 1} 照片中...`);
                    offsetPhotoBase64[i] = await compressImageFile(file, 1200, 0.8);
                    updateOffsetPhotoStatus();
                } catch (err) {
                    console.error(err);
                    alert(`支距 ${i + 1} 照片處理失敗`);
                } finally {
                    showLoadingMask(false);
                }
            };
        }

        document.getElementById("trafficPhotoBtn").onclick = () => {
            document.getElementById("trafficCameraInput").click();
        };

        document.getElementById("trafficPhotoClearBtn").onclick = () => {
            trafficPhotoBase64 = null;
            document.getElementById("trafficCameraInput").value = "";
            updateOffsetPhotoStatus();
        };

        document.getElementById("trafficCameraInput").onchange = async (e) => {
            const file = e.target.files?.[0];
            if (!file) return;

            try {
                showLoadingMask(true, "處理交維照片中...");
                trafficPhotoBase64 = await compressImageFile(file, 1200, 0.8);
                updateOffsetPhotoStatus();
            } catch (err) {
                console.error(err);
                alert("交維照片處理失敗");
            } finally {
                showLoadingMask(false);
            }
        };

        document.getElementById("reviewBtn").onclick = () => {
            if (!validateBeforePreview()) return;
            renderPreview();
            showPreviewMode();
        };

        document.getElementById("backToEditBtn").onclick = () => {
            showEditMode();
        };

        function closePanel() {
            document.getElementById("actionPanel").classList.remove("show");
            resetUIState();
        }

        function resetUIState() {
            processedPhotoBase64 = null;
            offsetPhotoBase64 = [null, null, null];
            trafficPhotoBase64 = null;

            cameraInput.value = "";
            for (let i = 0; i < 3; i++) {
                const input = document.getElementById(`offsetCameraInput${i}`);
                if (input) input.value = "";
            }
            const trafficInput = document.getElementById("trafficCameraInput");
            if (trafficInput) trafficInput.value = "";

            document.getElementById("previewMainPhoto").src = "";
            document.getElementById("previewOffsetPhoto0").src = "";
            document.getElementById("previewOffsetPhoto1").src = "";
            document.getElementById("previewOffsetPhoto2").src = "";
            document.getElementById("previewTrafficPhoto").src = "";

            document.getElementById("formArea").classList.remove("hidden");
            document.getElementById("previewArea").classList.add("hidden");

            for (let i = 1; i <= 3; i++) {
                document.getElementById(`dist_${i}`).value = "";
                document.getElementById(`note_type_${i}`).value = "";
                const idInput = document.getElementById(`note_id_${i}`);
                idInput.value = "";
                idInput.classList.add("hidden");
            }

            updateOffsetPhotoStatus();
        }

        document.getElementById("closePanelBtn").onclick = closePanel;

        async function generateExcel() {
            if (!templateData) throw new Error("template.xlsx 尚未載入");
            if (!selectedPoint) throw new Error("尚未選定點位");
            if (!selectedPoint.unific_id) throw new Error("此點缺少 unific_id");
            if (!processedPhotoBase64) throw new Error("請先拍攝照片");

            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(templateData);

            const offsets = collectOffsetData();

            const imageId = workbook.addImage({
                base64: processedPhotoBase64,
                extension: "jpeg"
            });

            const dims = await new Promise((resolve) => {
                const i = new Image();
                i.onload = () => resolve({ w: i.width, h: i.height });
                i.src = processedPhotoBase64;
            });

            const targetHeightPx = PHOTO_HEIGHT_PX;
            const targetWidthPx = targetHeightPx * (dims.w / dims.h);

            workbook.eachSheet((sheet) => {
                const sheetName = sheet.name.replace(/\s/g, "");
                let photoInsertedInSheet = false;

                sheet.eachRow({ includeEmpty: true }, (row, rowNumber) => {
                    row.eachCell({ includeEmpty: true }, (cell, colNumber) => {
                        const cellText = String(cell.value || "").trim();
                        const cleanVal = cellText.replace(/\s/g, "");

                        if (cleanVal === "編號") {
                            if (sheetName.includes("圖卡背面")) {
                                let rowOffset = 1;
                                while (rowNumber + rowOffset <= sheet.rowCount) {
                                    const targetCell = sheet.getRow(rowNumber + rowOffset).getCell(colNumber);
                                    if (targetCell.master.address !== cell.master.address) {
                                        targetCell.master.value = selectedPoint.unific_id || "";
                                        break;
                                    }
                                    rowOffset++;
                                }
                            } else {
                                let colOffset = 1;
                                while (colNumber + colOffset <= sheet.columnCount) {
                                    const targetCell = sheet.getRow(rowNumber).getCell(colNumber + colOffset);
                                    if (targetCell.master.address !== cell.master.address) {
                                        targetCell.master.value = selectedPoint.unific_id || "";
                                        break;
                                    }
                                    colOffset++;
                                }
                            }
                        }

                        if (cleanVal === "位置") {
                            let colOffset = 1;
                            while (colNumber + colOffset <= sheet.columnCount) {
                                const targetCell = sheet.getRow(rowNumber).getCell(colNumber + colOffset);
                                if (targetCell.master.address !== cell.master.address) {
                                    targetCell.master.value = selectedPoint.bury_loc || "";
                                    break;
                                }
                                colOffset++;
                            }
                        }

                        if (cleanVal === "位置描述") {
                            let rowOffset = 1;
                            while (rowNumber + rowOffset <= sheet.rowCount) {
                                const targetCell = sheet.getRow(rowNumber + rowOffset).getCell(colNumber);
                                if (targetCell.master.address !== cell.master.address) {
                                    targetCell.master.value = selectedPoint.bury_loc || "";
                                    break;
                                }
                                rowOffset++;
                            }
                        }

                        if (cleanVal === "支距") {
                            for (let i = 0; i < 3; i++) {
                                const dataRow = sheet.getRow(rowNumber + 1 + i);
                                dataRow.getCell(colNumber + 1).master.value = offsets[i].dist;
                                dataRow.getCell(colNumber + 2).master.value = offsets[i].note;
                            }
                        }

                        if (!photoInsertedInSheet && cleanVal.includes("現場照片")) {
                            sheet.addImage(imageId, {
                                tl: { col: colNumber - 1 + 0.1, row: rowNumber + 0.1 },
                                ext: { width: targetWidthPx, height: targetHeightPx },
                                editAs: "oneCell"
                            });
                            photoInsertedInSheet = true;
                        }
                    });
                });

                if (sheetName.includes("三支距照片")) {
                    const rightCol = Math.max(sheet.columnCount - 1, 1);
                    const startRows = [2, 18, 34];

                    for (let i = 0; i < 3; i++) {
                        if (!offsetPhotoBase64[i]) continue;

                        const offsetImgId = workbook.addImage({
                            base64: offsetPhotoBase64[i],
                            extension: "jpeg"
                        });

                        sheet.addImage(offsetImgId, {
                            tl: { col: rightCol - 1 + 0.1, row: startRows[i] - 1 + 0.1 },
                            ext: { width: OFFSET_PHOTO_WIDTH_PX, height: OFFSET_PHOTO_HEIGHT_PX },
                            editAs: "oneCell"
                        });
                    }
                }

                if (sheetName.includes("交維照片")) {
                    if (trafficPhotoBase64) {
                        const trafficImgId = workbook.addImage({
                            base64: trafficPhotoBase64,
                            extension: "jpeg"
                        });

                        const rightCol = Math.max(sheet.columnCount - 1, 1);
                        sheet.addImage(trafficImgId, {
                            tl: { col: rightCol - 1 + 0.1, row: 1.1 },
                            ext: { width: OFFSET_PHOTO_WIDTH_PX, height: OFFSET_PHOTO_HEIGHT_PX },
                            editAs: "oneCell"
                        });
                    }
                }
            });

            const buffer = await workbook.xlsx.writeBuffer();
            return new Blob([buffer], { type: XLSX_MIME });
        }

        document.getElementById("confirmSubmitBtn").onclick = async () => {
            if (!validateBeforePreview()) return;
            if (!selectedPoint?.unific_id) {
                alert("此點位沒有 unific_id，禁止匯出！");
                return;
            }

            const pointKey = getPointKey(selectedPoint);
            if (completedPointIds.has(pointKey)) {
                const ok = confirm("此點已有成果檔，是否覆蓋？");
                if (!ok) return;
            }

            try {
                showLoadingMask(true, "產生並上傳成果圖卡中...");

                const blob = await generateExcel();
                const fileInfo = await uploadExcelToCloud(blob, selectedPoint);

                await saveCompletedFileRecord(selectedPoint, fileInfo);
                await savePointCompleted(selectedPoint, fileInfo);

                triggerDownload(blob, fileInfo.fileName);

                if (selectedMarker) selectedMarker.closePopup();
                setTimeout(() => {
                    closePanel();
                }, 800);
            } catch (err) {
                console.error("完整錯誤物件：", err);
                console.error("錯誤代碼：", err?.code);
                console.error("錯誤訊息：", err?.message);
                alert("上傳或匯出失敗：" + (err?.message || err));
            } finally {
                showLoadingMask(false);
            }
        };

        function triggerDownload(blob, fileName) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.style.display = "none";
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);

            try {
                a.click();
            } catch (e) {
                window.location.href = url;
            }

            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 10000);

            if (/Line|FBAN|FBAV|Messenger/i.test(navigator.userAgent)) {
                alert("提醒：您正在使用社群 App 內建瀏覽器，若下載沒反應，請點選右上角並選擇「以 Chrome/Safari 開啟」。");
            }
        }

        function showLoadingMask(show, text) {
            document.getElementById("loading").style.display = show ? "flex" : "none";
            if (show && text) {
                document.getElementById("loadingMsg").textContent = text;
            }
        }
    </script>
</body>
</html>
