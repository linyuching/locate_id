<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>外業自動化拍照系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseCore = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, doc, setDoc, collection, onSnapshot };
    </script>

    <style>
        #map { height: 100vh; width: 100%; z-index: 1; }
        .loading-overlay {
            display: flex;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            color: white;
            flex-direction: column;
        }
        .btn-active:active { transform: scale(0.95); }
        #actionPanel { 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: none;
        }
        #actionPanel::-webkit-scrollbar { display: none; }
        #actionPanel.show { transform: translateY(0); }
        
        /* 標記狀態樣式 */
        .selected-marker { filter: hue-rotate(240deg) brightness(1.2); transform: scale(1.3); transition: all 0.3s; z-index: 999 !important; }
        .finished-marker { filter: hue-rotate(90deg) brightness(1.1) saturate(1.5); opacity: 0.9; }
        
        .leaflet-control-locate {
            background: white;
            width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 4px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
        .leaflet-bottom { bottom: 10px; transition: bottom 0.4s; }
        #actionPanel.show ~ #map .leaflet-bottom { bottom: 420px; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen overflow-hidden">

    <!-- 初始化遮罩 -->
    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-500 mb-6"></div>
        <h2 class="text-xl font-bold mb-2 tracking-tight text-center px-4">外業系統資料同步中</h2>
        <div id="loadingMsg" class="text-slate-400 text-sm text-center px-8 space-y-2">
            <p>正在連接雲端並載入資源...</p>
        </div>
    </div>

    <div id="map"></div>

    <!-- 狀態列 -->
    <div class="absolute top-4 left-4 right-4 z-[1000] pointer-events-none">
        <div class="bg-white/95 backdrop-blur-md p-3 rounded-2xl shadow-2xl flex justify-between items-center pointer-events-auto border border-white/20">
            <div class="flex items-center gap-2">
                <div id="statusIndicator" class="w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse"></div>
                <h1 class="text-lg font-black text-slate-800 tracking-tighter italic">外業全能拍照系統</h1>
            </div>
            <div id="statusTag" class="bg-slate-100 text-slate-500 text-[10px] px-2.5 py-1 rounded-full font-black uppercase tracking-tighter">同步中</div>
        </div>
    </div>

    <!-- 操作面板 -->
    <div id="actionPanel" class="fixed bottom-0 left-0 right-0 z-[2000] bg-white rounded-t-[2.5rem] shadow-[0_-15px_50px_rgba(0,0,0,0.4)] p-6 pb-12 border-t border-slate-100">
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
        
        <div class="flex justify-between items-start mb-6">
            <div class="flex-1">
                <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest bg-blue-50 px-2 py-0.5 rounded-md">目前選定點位</span>
                <h2 class="text-3xl font-black text-slate-900 mt-2 break-all" id="selectedId">讀取中</h2>
                <p id="selectedCoords" class="text-xs font-mono text-slate-400 mt-2 tracking-tighter"></p>
            </div>
            <div class="flex flex-col gap-2 ml-4">
                <button id="closePanelBtn" class="bg-slate-100 text-slate-400 p-2.5 rounded-full btn-active self-end shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
                <button id="navBtn" class="bg-blue-600 text-white p-4 rounded-2xl btn-active shadow-lg shadow-blue-200 flex flex-col items-center justify-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span class="text-[8px] font-bold">導航</span>
                </button>
            </div>
        </div>

        <div id="captureArea">
            <button id="cameraBtn" class="w-full bg-slate-900 text-white py-6 rounded-3xl font-black text-xl shadow-2xl btn-active flex items-center justify-center gap-4 tracking-tighter">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                現場拍攝
            </button>
        </div>

        <div id="previewArea" class="hidden animate-in fade-in slide-in-from-bottom-6 duration-500">
            <div class="relative mb-5 group">
                <img id="capturedImg" src="" class="w-full h-56 object-cover rounded-3xl border-4 border-slate-50 shadow-inner">
                <button id="retakeBtn" class="absolute bottom-4 right-4 bg-white/90 backdrop-blur-md px-4 py-2 rounded-full text-xs font-black text-slate-800 shadow-xl border border-white/50 btn-active">重拍照片</button>
            </div>
            
            <div class="space-y-3">
                <button id="shareBtn" class="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl btn-active text-lg flex items-center justify-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>
                    產生圖卡並存至雲端
                </button>
                <div class="grid grid-cols-2 gap-3">
                    <button id="exportBtn" class="bg-slate-100 text-slate-600 font-bold py-4 rounded-2xl btn-active text-sm shadow-sm">
                        下載成果檔案
                    </button>
                    <button id="finishBtn" class="bg-blue-50 text-blue-700 font-black py-4 rounded-2xl btn-active text-sm shadow-sm border border-blue-100">
                        完成回地圖
                    </button>
                </div>
            </div>
        </div>

        <input type="file" id="cameraInput" accept="image/*" capture="camera" class="hidden">
    </div>

    <script type="module">
        /**
         * --- 重要：在此填入您的 Firebase 配置 ---
         * 您可以從 Firebase Console -> 專案設定 -> 一般 -> 您的應用程式 -> SDK 設定與配置 中找到這段程式碼
         */
        const manualFirebaseConfig = {
              apiKey: "AIzaSyAQtyOTpKY3ajw6u4spxwLyFZDw19xhQEE",
              authDomain: "fieldsurveyproject-cba4e.firebaseapp.com",
              projectId: "fieldsurveyproject-cba4e",
              storageBucket: "fieldsurveyproject-cba4e.firebasestorage.app",
              messagingSenderId: "118885164027",
              appId: "1:118885164027:web:d8a0e0478eddfc48ba615e"
        };
        // ----------------------------------------

        let map, markersLayer, userLocationMarker, selectedPoint = null, templateData = null, capturedPhotoBase64 = null, selectedMarker = null;
        let finishedPoints = new Set();
        let db, auth, user, appId;
        const XLSX_MIME = "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet";

        window.onload = async function() {
            initMap();
            await initFirebase();
            await autoLoadAssets();
        };

        async function initFirebase() {
            const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, collection, onSnapshot } = window.firebaseCore;
            
            let config = manualFirebaseConfig;

            // 檢查是否已填入有效配置，若無則嘗試讀取系統環境變數
            if (!config || config.apiKey.startsWith("您的")) {
                try {
                    config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                } catch (e) { config = null; }
            }

            if (!config) {
                document.getElementById('loadingMsg').innerHTML = `
                    <div class="text-amber-400 font-bold mb-4">尚未設定 Firebase</div>
                    <div class="text-xs text-slate-300 text-left px-6">
                        請編輯 <span class="text-white">index.html</span> 並在第 106 行的 <span class="text-white">manualFirebaseConfig</span> 填入您的 Firebase 配置。<br><br>
                        如果您在本地執行且不需要儲存功能，系統將無法正常同步進度。
                    </div>
                `;
                return;
            }

            const app = initializeApp(config);
            auth = getAuth(app);
            db = getFirestore(app);
            appId = typeof __app_id !== 'undefined' ? __app_id : 'field-survey-app';

            // 認證邏輯
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            await initAuth();

            return new Promise((resolve) => {
                onAuthStateChanged(auth, (u) => {
                    user = u;
                    if (user) {
                        // 監聽雲端儲存的已完成點位
                        const finishedCol = collection(db, 'artifacts', appId, 'users', user.uid, 'finished_points');
                        onSnapshot(finishedCol, (snapshot) => {
                            finishedPoints.clear();
                            snapshot.forEach(doc => finishedPoints.add(doc.id));
                            refreshMarkers();
                        }, (error) => console.error("Firebase 同步失敗:", error));
                    }
                    resolve();
                });
            });
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([23.5, 121], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);
            markersLayer = L.layerGroup().addTo(map);
            L.control.zoom({ position: 'topright' }).addTo(map);

            const LocateControl = L.Control.extend({
                options: { position: 'topright' },
                onAdd: function() {
                    const container = L.DomUtil.create('div', 'leaflet-control-locate');
                    container.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-700" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06z" /></svg>`;
                    container.onclick = () => map.locate({ setView: true, maxZoom: 16 });
                    return container;
                }
            });
            map.addControl(new LocateControl());

            map.on('locationfound', (e) => {
                if (userLocationMarker) map.removeLayer(userLocationMarker);
                userLocationMarker = L.circleMarker(e.latlng, { radius: 8, fillColor: "#3b82f6", color: "white", weight: 2, fillOpacity: 0.8 }).addTo(map);
            });
        }

        async function autoLoadAssets() {
            const loadingMsg = document.getElementById('loadingMsg');
            try {
                const kmlRes = await fetch('./POI.kml');
                if (!kmlRes.ok) throw new Error('讀取 POI.kml 失敗');
                const kmlText = await kmlRes.text();
                window.allPoints = parseKML(kmlText); 
                plotPoints(window.allPoints);

                const xlsxRes = await fetch('./template.xlsx');
                if (!xlsxRes.ok) throw new Error('讀取 template.xlsx 失敗');
                templateData = await xlsxRes.arrayBuffer();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('statusTag').textContent = '雲端同步就緒';
                document.getElementById('statusIndicator').className = 'w-2.5 h-2.5 rounded-full bg-emerald-500';
            } catch (err) {
                console.error(err);
                loadingMsg.innerHTML = `<div class="text-red-400">自動載入失敗: ${err.message}</div>`;
            }
        }

        function parseKML(text) {
            const parser = new DOMParser();
            const xml = parser.parseFromString(text, "text/xml");
            const placemarks = xml.getElementsByTagName("Placemark");
            const results = [];
            for (let i = 0; i < placemarks.length; i++) {
                const p = placemarks[i];
                const name = p.getElementsByTagName("name")[0]?.textContent || "未命名";
                const coords = p.getElementsByTagName("coordinates")[0]?.textContent?.trim();
                if (coords) {
                    const parts = coords.split(",");
                    if (parts.length >= 2) results.push({ id: name, lat: parseFloat(parts[1]), lng: parseFloat(parts[0]) });
                }
            }
            return results;
        }

        function plotPoints(points) {
            markersLayer.clearLayers();
            points.forEach(p => {
                const isFinished = finishedPoints.has(p.id);
                const m = L.marker([p.lat, p.lng]).on('click', () => {
                    if (selectedMarker) {
                        const el = selectedMarker.getElement();
                        if (el) el.classList.remove('selected-marker');
                    }
                    selectedMarker = m;
                    const el = m.getElement();
                    if (el) el.classList.add('selected-marker');
                    selectedPoint = p;
                    document.getElementById('actionPanel').classList.add('show');
                    document.getElementById('selectedId').textContent = p.id;
                    document.getElementById('selectedCoords').textContent = `LAT: ${p.lat.toFixed(6)} / LNG: ${p.lng.toFixed(6)}`;
                    resetUIState();
                });
                markersLayer.addLayer(m);
                if (isFinished) {
                    m.on('add', () => {
                        const el = m.getElement();
                        if (el) el.classList.add('finished-marker');
                    });
                }
            });
            if (points.length > 0) map.fitBounds(markersLayer.getLayers().map(l => l.getLatLng()), { padding: [60, 60] });
        }

        function refreshMarkers() {
            markersLayer.eachLayer(m => {
                const latlng = m.getLatLng();
                const p = window.allPoints?.find(pt => Math.abs(pt.lat - latlng.lat) < 0.00001 && Math.abs(pt.lng - latlng.lng) < 0.00001);
                const el = m.getElement();
                if (p && finishedPoints.has(p.id) && el) {
                    el.classList.add('finished-marker');
                }
            });
        }

        const cameraBtn = document.getElementById('cameraBtn');
        const cameraInput = document.getElementById('cameraInput');
        cameraBtn.onclick = () => cameraInput.click();
        document.getElementById('retakeBtn').onclick = () => cameraInput.click();
        cameraInput.onchange = e => {
            if (!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = ev => {
                capturedPhotoBase64 = ev.target.result;
                document.getElementById('capturedImg').src = capturedPhotoBase64;
                document.getElementById('captureArea').classList.add('hidden');
                document.getElementById('previewArea').classList.remove('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('closePanelBtn').onclick = closePanel;
        document.getElementById('finishBtn').onclick = closePanel;
        function closePanel() {
            document.getElementById('actionPanel').classList.remove('show');
            if (selectedMarker) {
                const el = selectedMarker.getElement();
                if (el) el.classList.remove('selected-marker');
            }
            resetUIState();
        }
        function resetUIState() {
            capturedPhotoBase64 = null;
            document.getElementById('captureArea').classList.remove('hidden');
            document.getElementById('previewArea').classList.add('hidden');
        }
        document.getElementById('navBtn').onclick = () => {
            if (selectedPoint) window.open(`https://www.google.com/maps/dir/?api=1&destination=${selectedPoint.lat},${selectedPoint.lng}`, '_blank');
        };

        async function saveFinishedState(pointId) {
            if (!user) return;
            const { doc, setDoc } = window.firebaseCore;
            const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'finished_points', pointId);
            await setDoc(docRef, { finished: true, timestamp: Date.now() });
        }

        async function generateExcel() {
            if (!templateData || !capturedPhotoBase64) throw new Error("資料尚未就緒");
            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(templateData);
            const imageId = workbook.addImage({ base64: capturedPhotoBase64, extension: 'png' });
            
            const targetHeightPx = 227; // 6cm
            const dims = await new Promise(r => { const i = new Image(); i.onload = () => r({w:i.width,h:i.height}); i.src = capturedPhotoBase64; });
            const targetWidthPx = targetHeightPx * (dims.w / dims.h);

            workbook.eachSheet(sheet => {
                let photoInserted = false;
                sheet.eachRow({ includeEmpty: true }, (row, rowNumber) => {
                    row.eachCell({ includeEmpty: true }, (cell, colNumber) => {
                        if (cell.address !== cell.master.address) return;
                        const val = cell.value ? String(cell.value).trim() : "";
                        if (!photoInserted && val.includes("現場照片")) {
                            sheet.addImage(imageId, { tl: { col: colNumber - 1 + 0.1, row: rowNumber + 0.1 }, ext: { width: targetWidthPx, height: targetHeightPx }, editAs: 'oneCell' });
                            photoInserted = true; 
                        }
                        if (val === "編號") {
                            const cellBelow = sheet.getRow(rowNumber + 1).getCell(colNumber);
                            cellBelow.value = selectedPoint.id;
                        }
                    });
                });
            });

            if (selectedPoint) {
                await saveFinishedState(selectedPoint.id);
            }
            const buffer = await workbook.xlsx.writeBuffer();
            return new Blob([buffer], { type: XLSX_MIME });
        }

        document.getElementById('shareBtn').onclick = async () => {
            try {
                showLoadingMask(true, "處理並同步進度中...");
                const blob = await generateExcel();
                const fileName = `${selectedPoint.id}_成果圖卡.xlsx`;
                const file = new File([blob], fileName, { type: XLSX_MIME });
                if (navigator.share && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file], title: '成果分享', text: `點號: ${selectedPoint.id}` });
                } else { triggerDownload(blob, fileName); }
            } catch (err) { alert(err.message); }
            showLoadingMask(false);
        };

        document.getElementById('exportBtn').onclick = async () => {
            try {
                showLoadingMask(true, "產生成果檔案中...");
                const blob = await generateExcel();
                triggerDownload(blob, `${selectedPoint.id}_成果圖卡.xlsx`);
            } catch (err) { alert(err.message); }
            showLoadingMask(false);
        };

        function triggerDownload(blob, fileName) {
            const a = document.createElement("a");
            const url = URL.createObjectURL(blob);
            a.href = url;
            a.download = fileName;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }

        function showLoadingMask(s, t) {
            document.getElementById('loading').style.display = s ? 'flex' : 'none';
            if (s) document.getElementById('loadingMsg').textContent = t;
        }
    </script>
</body>
</html>
