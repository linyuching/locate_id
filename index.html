<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>外業調查拍照系統 (雲端同步版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";
        
        // 直接把所有需要的工具掛在 window.firebaseCore 下
        window.firebaseCore = { 
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, 
            getFirestore, doc, setDoc, collection,
            getStorage, ref, uploadString, getDownloadURL 
        };
    </script>

    <style>
        #map { height: 100vh; width: 100%; z-index: 1; }
        .loading-overlay {
            display: flex;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            color: white;
            flex-direction: column;
        }
        .btn-active:active { transform: scale(0.95); }
        #actionPanel { 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: none;
        }
        #actionPanel.show { transform: translateY(0); }
        .selected-marker { filter: hue-rotate(240deg) brightness(1.2); transform: scale(1.3); transition: all 0.3s; z-index: 999 !important; }
        .leaflet-top { margin-top: 80px; }
        .leaflet-control-locate {
            background: white; width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 4px; box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen overflow-hidden">

    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-500 mb-6"></div>
        <h2 class="text-xl font-bold mb-2 tracking-tight text-center px-4">系統同步中</h2>
        <div id="loadingMsg" class="text-slate-400 text-sm text-center px-8">正在連接雲端服務...</div>
    </div>

    <div id="map"></div>

    <div class="absolute top-4 left-4 right-4 z-[1000] pointer-events-none">
        <div class="bg-white/95 backdrop-blur-md p-3 rounded-2xl shadow-2xl flex justify-between items-center pointer-events-auto border border-white/20">
            <div class="flex items-center gap-2">
                <div id="statusIndicator" class="w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse"></div>
                <h1 class="text-lg font-black text-slate-800 tracking-tighter">外業調查拍照 <span class="text-blue-500 text-xs">V2.5 Cloud</span></h1>
            </div>
            <div id="statusTag" class="bg-slate-100 text-slate-500 text-[10px] px-2.5 py-1 rounded-full font-black uppercase">連線中</div>
        </div>
    </div>

    <div id="actionPanel" class="fixed bottom-0 left-0 right-0 z-[2000] bg-white rounded-t-[2.5rem] shadow-[0_-15px_50px_rgba(0,0,0,0.4)] p-6 pb-12">
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
        
        <div class="flex justify-between items-start mb-6">
            <div class="flex-1">
                <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest bg-blue-50 px-2 py-0.5 rounded-md">目前選定點位</span>
                <h2 class="text-2xl font-black text-slate-900 mt-2 break-all leading-tight" id="selectedId">讀取中</h2>
                <p id="selectedLoc" class="text-xs text-slate-500 mt-1 font-medium italic"></p>
                <p id="selectedUnific" class="text-[10px] text-slate-400 mt-1 font-mono"></p>
            </div>
            <button id="closePanelBtn" class="bg-slate-100 text-slate-400 p-2.5 rounded-full btn-active"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
        </div>

        <div id="formArea" class="space-y-4 mb-6">
            <div class="bg-slate-50 rounded-3xl p-4 border border-slate-100">
                <div class="space-y-3" id="offsetRows"></div>
            </div>
            <button id="cameraBtn" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black text-lg shadow-xl btn-active flex items-center justify-center gap-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                拍攝現場照片
            </button>
        </div>

        <div id="previewArea" class="hidden">
            <div class="relative mb-6">
                <img id="capturedImg" src="" class="w-full h-52 object-cover rounded-3xl border-4 border-slate-50 shadow-inner">
                <button id="retakeBtn" class="absolute bottom-4 right-4 bg-white/90 px-4 py-2 rounded-full text-xs font-black shadow-xl border border-white/50 btn-active text-slate-800">重新拍攝</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button id="exportBtn" class="bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl btn-active text-lg flex flex-col items-center justify-center">
                    <span class="text-xs opacity-80 font-medium mb-1">同步雲端並</span>
                    匯出成果
                </button>
                <button id="finishBtn" class="bg-slate-100 text-slate-500 font-bold py-5 rounded-2xl btn-active text-base border border-slate-200">返回修改</button>
            </div>
        </div>

        <input type="file" id="cameraInput" accept="image/*" capture="camera" class="hidden">
    </div>

    <script type="module">
        // --- 請務必填寫你的 Firebase 配置 ---
        const config = {
              apiKey: "AIzaSyAQtyOTpKY3ajw6u4spxwLyFZDw19xhQEE",
              authDomain: "fieldsurveyproject-cba4e.firebaseapp.com",
              projectId: "fieldsurveyproject-cba4e",
              storageBucket: "fieldsurveyproject-cba4e.firebasestorage.app",
              messagingSenderId: "118885164027",
              appId: "1:118885164027:web:d8a0e0478eddfc48ba615e"
        };

        let map, markersLayer, selectedPoint = null, templateData = null, processedPhotoBase64 = null, selectedMarker = null;
        let db, auth, storage;

        const NOTE_OPTIONS = ["建築物( )", "門柱( )", "圍牆( )", "電桿( )", "路燈( )", "窨井蓋", "道路邊緣"];

        window.onload = async function() {
            initMap();
            initFirebase();
            createFormRows();
            await autoLoadAssets();
        };

        function initMap() {
            map = L.map('map', { zoomControl: false, maxZoom: 20 }).setView([23.5, 121], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            markersLayer = L.layerGroup().addTo(map);
        }

        function createFormRows() {
            const container = document.getElementById('offsetRows');
            for (let i = 1; i <= 3; i++) {
                const row = document.createElement('div');
                row.className = 'grid grid-cols-12 gap-2 items-center mb-2';
                row.innerHTML = `
                    <div class="col-span-1 text-center font-black text-slate-300 text-sm">${i}</div>
                    <div class="col-span-3"><input type="number" id="dist_${i}" placeholder="距離" class="w-full bg-white border border-slate-200 rounded-xl px-2 py-2.5 text-xs font-bold outline-none"></div>
                    <div class="col-span-5">
                        <select id="note_type_${i}" class="w-full bg-white border border-slate-200 rounded-xl px-2 py-2.5 text-xs font-bold outline-none">
                            <option value="">選擇註記</option>
                            ${NOTE_OPTIONS.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                        </select>
                    </div>
                    <div class="col-span-3"><input type="text" id="note_id_${i}" placeholder="編號" class="hidden w-full bg-blue-50 border border-blue-100 rounded-xl px-2 py-2.5 text-xs font-bold text-blue-700 outline-none"></div>
                `;
                container.appendChild(row);
                const select = row.querySelector(`#note_type_${i}`);
                const idInput = row.querySelector(`#note_id_${i}`);
                select.onchange = (e) => e.target.value.includes('( )') ? idInput.classList.remove('hidden') : idInput.classList.add('hidden');
            }
        }

        async function initFirebase() {
            const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, getStorage } = window.firebaseCore;
            const app = initializeApp(config);
            auth = getAuth(app);
            db = getFirestore(app);
            storage = getStorage(app);

            onAuthStateChanged(auth, async (u) => {
                if (!u) await signInAnonymously(auth);
                document.getElementById('statusTag').textContent = "雲端已連線";
                document.getElementById('statusTag').className = "bg-emerald-100 text-emerald-600 text-[10px] px-2.5 py-1 rounded-full font-black uppercase";
            });
        }

        async function autoLoadAssets() {
            try {
                const [kmlRes, xlsxRes] = await Promise.all([fetch('./POI.kml'), fetch('./template.xlsx')]);
                const kmlText = await kmlRes.text();
                window.allPoints = parseKML(kmlText); 
                plotPoints(window.allPoints);
                templateData = await xlsxRes.arrayBuffer();
                document.getElementById('loading').style.display = 'none';
            } catch (err) { console.error("資源載入失敗", err); }
        }

        function parseKML(text) {
            const xml = new DOMParser().parseFromString(text, "text/xml");
            return Array.from(xml.getElementsByTagName("Placemark")).map(p => {
                const name = p.getElementsByTagName("name")[0]?.textContent || "未命名";
                const coords = p.getElementsByTagName("coordinates")[0]?.textContent.trim().split(",") || [0,0];
                let unific_id = "", bury_loc = "";
                const dataNodes = Array.from(p.getElementsByTagName("Data"));
                dataNodes.forEach(node => {
                    const dName = node.getAttribute("name");
                    const dVal = node.getElementsByTagName("value")[0]?.textContent?.trim();
                    if (dName === "unific_id") unific_id = dVal;
                    if (dName === "bury_loc") bury_loc = dVal;
                });
                return { id: name, unific_id: unific_id || name, lat: parseFloat(coords[1]), lng: parseFloat(coords[0]), bury_loc };
            });
        }

        function plotPoints(points) {
            markersLayer.clearLayers();
            points.forEach(p => {
                const m = L.marker([p.lat, p.lng]).on('click', () => {
                    map.flyTo([p.lat, p.lng], 17);
                    if (selectedMarker) selectedMarker.getElement()?.classList.remove('selected-marker');
                    selectedMarker = m;
                    m.getElement()?.classList.add('selected-marker');
                    selectedPoint = p;
                    document.getElementById('selectedId').textContent = p.id;
                    document.getElementById('selectedLoc').textContent = p.bury_loc || "位置未標註";
                    document.getElementById('selectedUnific').textContent = `ID: ${p.unific_id}`;
                    document.getElementById('actionPanel').classList.add('show');
                    resetUIState();
                });
                markersLayer.addLayer(m);
            });
        }

        const cameraInput = document.getElementById('cameraInput');
        document.getElementById('cameraBtn').onclick = () => cameraInput.click();
        document.getElementById('retakeBtn').onclick = () => cameraInput.click();
        
        cameraInput.onchange = async e => {
            if (!e.target.files[0]) return;
            showLoadingMask(true, "縮圖處理中...");
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200;
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    processedPhotoBase64 = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('capturedImg').src = processedPhotoBase64;
                    document.getElementById('formArea').classList.add('hidden');
                    document.getElementById('previewArea').classList.remove('hidden');
                    showLoadingMask(false);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('exportBtn').onclick = async () => {
            try {
                showLoadingMask(true, "雲端儲存中 (1/2)...");
                const { ref, uploadString } = window.firebaseCore.storage;
                
                // 拍一張存成兩份檔名
                const nameA = `${selectedPoint.unific_id}_三支距.jpg`;
                const nameB = `${selectedPoint.unific_id}_交維.jpg`;
                
                await Promise.all([
                    uploadString(ref(storage, `photos/${nameA}`), processedPhotoBase64, 'data_url'),
                    uploadString(ref(storage, `photos/${nameB}`), processedPhotoBase64, 'data_url')
                ]);

                showLoadingMask(true, "產生成果圖卡 (2/2)...");
                const blob = await generateExcel();
                triggerDownload(blob, `${selectedPoint.unific_id}_調查成果.xlsx`);
                setTimeout(closePanel, 800);
            } catch (err) { alert("同步失敗: " + err.message); }
            showLoadingMask(false);
        };

        async function generateExcel() {
            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(templateData);
            const offsets = [];
            for (let i = 1; i <= 3; i++) {
                const dist = document.getElementById(`dist_${i}`).value;
                const type = document.getElementById(`note_type_${i}`).value;
                const noteId = document.getElementById(`note_id_${i}`).value;
                offsets.push({ dist, note: type.includes('( )') ? type.replace('( )', `(${noteId})`) : type });
            }
            const imageId = workbook.addImage({ base64: processedPhotoBase64, extension: 'jpeg' });
            
            workbook.eachSheet((sheet) => {
                sheet.eachRow({ includeEmpty: true }, (row, rowNumber) => {
                    row.eachCell({ includeEmpty: true }, (cell, colNumber) => {
                        const cleanVal = String(cell.value || "").replace(/\s/g, '');
                        if (cleanVal === "編號") sheet.getRow(rowNumber).getCell(colNumber + 1).value = selectedPoint.unific_id;
                        if (cleanVal === "位置") sheet.getRow(rowNumber).getCell(colNumber + 1).value = selectedPoint.bury_loc;
                        if (cleanVal === "支距") {
                            for (let i = 0; i < 3; i++) {
                                sheet.getRow(rowNumber + 1 + i).getCell(colNumber + 1).value = offsets[i].dist;
                                sheet.getRow(rowNumber + 1 + i).getCell(colNumber + 2).value = offsets[i].note;
                            }
                        }
                        if (cleanVal.includes("現場照片")) {
                            sheet.addImage(imageId, { tl: { col: colNumber - 0.9, row: rowNumber + 0.1 }, ext: { width: 400, height: 250 } });
                        }
                    });
                });
            });
            const buffer = await workbook.xlsx.writeBuffer();
            return new Blob([buffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        }

        function triggerDownload(blob, fileName) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = fileName; a.click();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function showLoadingMask(s, t) {
            document.getElementById('loading').style.display = s ? 'flex' : 'none';
            if (s) document.getElementById('loadingMsg').textContent = t;
        }

        function resetUIState() {
            processedPhotoBase64 = null;
            document.getElementById('formArea').classList.remove('hidden');
            document.getElementById('previewArea').classList.add('hidden');
        }

        function closePanel() { document.getElementById('actionPanel').classList.remove('show'); }
        document.getElementById('closePanelBtn').onclick = closePanel;
        document.getElementById('finishBtn').onclick = () => {
            document.getElementById('formArea').classList.remove('hidden');
            document.getElementById('previewArea').classList.add('hidden');
        };
    </script>
</body>
</html>
